<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hello World</title>
  <style>
    body {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      font-family: sans-serif;
      background-image: repeating-conic-gradient(#333 0% 25%, #888 0% 50%);
      background-size: 80px 80px;
    }
    h1 {
      font-size: 3rem;
      color: #fff;
      text-shadow: 2px 2px 6px #000;
    }
    button {
      margin-top: 2rem;
      padding: 0.75rem 2rem;
      font-size: 1rem;
      background: #888;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
    button:hover {
      background: #aaa;
    }
  </style>
</head>
<body>
  <h1>Hello Mr. Blake!</h1>
  <button onclick="window.location.href='index.html'">Go Back</button>
</body>
</html>
